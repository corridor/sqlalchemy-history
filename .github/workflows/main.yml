name: "Test"

on:
  push:
    branches:
      - master
    paths-ignore:
      - "docs/**"
  pull_request:
    paths-ignore:
      - "docs/**"

jobs:
  test-sqlalchemy-history:
    name: test-python${{ matrix.python-version }}-${{ matrix.DB }}
    strategy:
      fail-fast: false # This prevents other jobs from being canceled when one fails
      matrix:
        python-version:
          - "3.9"
          - "3.12"
        DB:
          - "sqlite"
          - "mssql"
          - "mysql"
          - "oracle"
          - "postgres"
    services:
      mysql:
        # Only start service for MySQL tests
        image: ${{ matrix.DB == 'mysql' && 'mysql' || '' }}
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: sqlalchemy_history_test
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 3
      postgres:
        # Only start service for PostgreSQL tests
        image: ${{ matrix.DB == 'postgres' && 'postgres' || '' }}
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sqlalchemy_history_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 2s
          --health-retries 3
      mssql:
        # Only start service for MSSQL tests
        image: ${{ matrix.DB == 'mssql' && 'mcr.microsoft.com/mssql/server:2017-latest' || '' }}
        ports:
          - 1433:1433
        env:
          MSSQL_SA_PASSWORD: MSsql2022
          ACCEPT_EULA: N
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -U $DB_USER -P $SA_PASSWORD -Q 'select 1' -b -o /dev/null"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 3
      oracle:
        # Only start service for Oracle tests
        image: ${{ matrix.DB == 'oracle' && 'gvenzl/oracle-xe:21' || '' }}
        ports:
          - 1521:1521
        env:
          ORACLE_PASSWORD: Oracle2022
        options: >-
          --health-cmd healthcheck.sh
          --health-interval 30s
          --health-timeout 15s
          --health-retries 5

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install SQL Server Drivers
        if: matrix.DB == 'mssql'
        run: |
          # See: https://github.com/MicrosoftDocs/sql-docs/blob/live/docs/connect/odbc/linux-mac/installing-the-microsoft-odbc-driver-for-sql-server.md
          if ! [[ "14.04 16.04 18.04 20.04 22.04 24.04 25.10" == *"$(grep VERSION_ID /etc/os-release | cut -d '"' -f 2)"* ]];
          then
              echo "Ubuntu $(grep VERSION_ID /etc/os-release | cut -d '"' -f 2) is not currently supported.";
              exit;
          fi

          # Download the package to configure the Microsoft repo
          curl -sSL -O https://packages.microsoft.com/config/ubuntu/$(grep VERSION_ID /etc/os-release | cut -d '"' -f 2)/packages-microsoft-prod.deb
          # Install the package
          sudo dpkg -i packages-microsoft-prod.deb
          # Delete the file
          rm packages-microsoft-prod.deb

          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17
          echo '/opt/mssql-tools/bin' >> $GITHUB_PATH

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install the project
        run: uv sync --locked --no-dev --group test

      - name: Run tests
        run: |
          uv run --no-sync pytest -v --maxfail=100 --cov --cov-report=lcov
        env:
          DB: ${{ matrix.DB }}

      - name: send coverage data to Coveralls
        env:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        uses: coverallsapp/github-action@v2
        with:
          file: ./coverage.lcov
          flag-name: sqlalchemy-history
          parallel: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install the project
        run: uv sync --locked --dev

      - run: uv run --no-sync ruff check
      - run: uv run --no-sync ruff format --check

  generate-coverage-report:
    runs-on: ubuntu-latest
    needs: [test-sqlalchemy-history]
    steps:
      - name: Coveralls
        env:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
